<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seguimiento - LandingKit</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>body{font-family:system-ui;margin:0;padding:20px;background:#f5f5f5}.container{max-width:800px;margin:0 auto}.card{background:white;border-radius:12px;padding:20px;margin:20px 0}#map{height:300px;border-radius:12px}.timeline{display:flex;justify-content:space-between;margin:20px 0}.step{text-align:center;flex:1;color:#999}.step.completed{color:#00d98b}.step.current{color:#6366f1;font-weight:bold}.step-icon{width:30px;height:30px;border-radius:50%;background:#eee;margin:0 auto 5px;display:flex;align-items:center;justify-content:center}.step.completed .step-icon{background:#00d98b;color:white}.step.current .step-icon{background:#6366f1;color:white}</style>
</head>
<body>
<div class="container">
  <div class="card">
    <h2>📦 Seguimiento de pedido</h2>
    <p>Pedido: <strong id="orderId"></strong></p>
    <div id="map"></div>
    <div class="timeline" id="timeline"></div>
    <p id="status" style="text-align:center"></p>
  </div>
</div>
<script>
const API='https://script.google.com/macros/s/AKfycbznj6hXKUKqoM5lnOP_kC78LCve60Ekw0HQjLcqMA/dev';
const params=new URLSearchParams(window.location.search);
const orderId=params.get('orderId');
let map;

document.getElementById('orderId').textContent=orderId||'No especificado';

if(orderId){
  initMap();
  updateTracking();
  setInterval(updateTracking,30000);
}

function initMap(){
  map=L.map('map').setView([19.4326,-99.1332],13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
}

async function updateTracking(){
  try{
    const res=await fetch(API+'?action=order.track&orderId='+orderId);
    const d=await res.json();
    if(d.ok){
      renderTimeline(d.timeline);
      document.getElementById('status').textContent='Estado: '+d.status;
      if(d.lat&&d.lng){
        map.setView([d.lat,d.lng],14);
        L.marker([d.lat,d.lng]).addTo(map).bindPopup('Ubicación del pedido').openPopup();
      }
    }
  }catch(e){}
}

function renderTimeline(steps){
  document.getElementById('timeline').innerHTML=steps.map(s=>'<div class="step '+(s.completed?'completed':'')+(s.current?' current':'')+'"><div class="step-icon">'+(s.completed?'✓':'○')+'</div><div>'+s.label+'</div></div>').join('');
}
</script>
</body>
</html>
